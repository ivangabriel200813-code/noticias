<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gospel News</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="container">

        <div class="left">
            <h1>Crie sua conta</h1>

            <p>
                Faça parte da comunidade Gospel News e acompanhe
                tudo sobre o evangelho atualmente.
            </p>
        </div>

        <div class="right">

            <form id="cadastroForm">

                <h2>Cadastro</h2>

                <input type="text" id="nome" placeholder="Seu nome" required>

                <input type="email" id="novoEmail" placeholder="Seu email" required>

                <input type="password" id="novaSenha" placeholder="Sua senha" required>

                <button type="submit">Cadastrar</button>

                <p>
                    Já possui conta?
                    <a href="login.html">Entrar</a>
                </p>

            </form>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
