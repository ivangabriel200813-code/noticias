<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="container">

        <div class="left">

            <h1>Recuperar senha</h1>

            <p>
                Digite seu email para redefinir
                sua senha da Gospel News.
            </p>

        </div>

        <div class="right">

            <form id="recuperarForm">

                <h2>Nova senha</h2>

                <input type="email" id="emailRecuperacao" placeholder="Seu email" required>

                <input type="password" id="novaSenhaRecuperada" placeholder="Nova senha" required>

                <button type="submit">
                    Salvar nova senha
                </button>

                <p>
                    <a href="login.html">
                        Voltar para login
                    </a>
                </p>

            </form>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
