<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missões - Gospel News</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <div class="logo">
            Gospel News
        </div>

        <nav>
            <a href="index.html">Início</a>
            <a href="louvores.html">Louvores</a>
            <a href="missoes.html">Missões</a>
        </nav>

    </header>

    <section class="page-banner">

        <h1>Participe das Missões</h1>

        <p>
            Faça parte da obra missionária pelo Brasil e pelas nações.
        </p>

    </section>

    <div class="missoes-box">

        <form class="missoes-form">

            <h2>Cadastro Missionário</h2>

            <input type="text" placeholder="Seu nome" required>

            <input type="email" placeholder="Seu email" required>

            <select required>

                <option value="">
                    Escolha uma missão
                </option>

                <option>
                    Missões pelo Brasil
                </option>

                <option>
                    Missões pelas Nações
                </option>

            </select>

            <textarea placeholder="Conte um pouco sobre você"></textarea>

            <button type="submit">
                Quero Participar
            </button>

        </form>

    </div>

</body>
</html>
